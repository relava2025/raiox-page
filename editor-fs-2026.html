<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="robots" content="noindex, nofollow"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Editor · Diagnóstico FACE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#081420; --panel:#0d1c2b; --panel-2:#122435;
    --azul-900:#003057; --azul-950:#001a33;
    --verde:#78BE20; --verde-escuro:#5da018;
    --b06:rgba(255,255,255,0.06); --b08:rgba(255,255,255,0.08);
    --b12:rgba(255,255,255,0.12); --b20:rgba(255,255,255,0.20);
    --texto:#e8eef4; --texto-2:rgba(232,238,244,.6);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--texto);min-height:100vh;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}

  header{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;padding:14px 20px;border-bottom:1px solid var(--b08);background:var(--panel);position:sticky;top:0;z-index:50}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--verde),var(--verde-escuro));display:flex;align-items:center;justify-content:center}
  .brand h1{font-size:15px;font-weight:700;letter-spacing:-.01em}
  .brand span{display:block;font-size:11px;color:var(--texto-2);font-weight:500}
  .header-actions{display:flex;gap:8px;flex-wrap:wrap}
  .hbtn{padding:9px 14px;border-radius:8px;font-size:12.5px;font-weight:600;background:var(--b06);border:1px solid var(--b08);color:var(--texto);display:flex;align-items:center;gap:7px;transition:background .15s ease}
  .hbtn:hover{background:var(--b12)}
  .hbtn.primary{background:linear-gradient(135deg,var(--verde),var(--verde-escuro));color:var(--azul-900);border-color:transparent;font-weight:700}
  .hbtn.primary:hover{filter:brightness(1.06)}
  .hbtn svg{width:14px;height:14px}

  .layout{display:grid;grid-template-columns:300px 1fr 400px;min-height:calc(100vh - 63px)}
  @media(max-width:1200px){.layout{grid-template-columns:280px 1fr}.preview-col{display:none}}
  @media(max-width:820px){.layout{grid-template-columns:1fr}.sidebar{border-right:none;border-bottom:1px solid var(--b08)}}

  .sidebar{border-right:1px solid var(--b08);background:var(--panel);padding:18px 14px;overflow-y:auto}
  .side-label{font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--texto-2);margin:14px 4px 10px}
  .side-label:first-child{margin-top:0}
  .bloco-item{width:100%;text-align:left;display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;margin-bottom:4px;background:transparent;border:1px solid transparent;color:var(--texto);font-size:12.5px;font-weight:600;transition:background .15s ease}
  .bloco-item:hover{background:var(--b06)}
  .bloco-item.active{background:var(--panel-2);border-color:var(--b12)}
  .bloco-item .dot{width:11px;height:11px;border-radius:4px;flex-shrink:0}
  .step-item{width:100%;text-align:left;display:flex;align-items:center;gap:10px;padding:10px 12px 10px 9px;border-radius:10px;margin-bottom:5px;background:transparent;border:1px solid transparent;border-left:3px solid transparent;color:var(--texto);transition:background .15s ease}
  .step-item:hover{background:var(--b06)}
  .step-item.active{background:var(--panel-2);border-color:var(--b12)}
  .step-item .num{width:24px;height:24px;border-radius:7px;flex-shrink:0;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;background:var(--b08);color:var(--texto-2)}
  .step-item.active .num{background:rgba(120,190,32,.18);color:var(--verde)}
  .step-item .info{flex:1;min-width:0}
  .step-item .info .t{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .step-item .info .k{font-size:10px;color:var(--texto-2);margin-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;letter-spacing:.04em}
  .tag.input{background:rgba(93,160,255,.15);color:#7db4ff}
  .tag.options{background:rgba(120,190,32,.15);color:var(--verde)}
  .tag.multi{background:rgba(190,120,255,.15);color:#c99cff}
  .tag.mensagem{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}
  .tag.logic{background:rgba(255,190,60,.15);color:#ffbe3c}
  .add-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}
  .add-grid button,.btn-add-bloco{padding:9px;border-radius:9px;font-size:11px;font-weight:600;background:var(--b06);border:1px dashed var(--b20);color:var(--texto-2);transition:all .15s ease}
  .add-grid button:hover,.btn-add-bloco:hover{color:var(--verde);border-color:var(--verde)}
  .btn-add-bloco{width:100%;margin-top:6px}
  .side-sep{height:1px;background:var(--b08);margin:16px 0}
  .side-config-btn{width:100%;text-align:left;padding:11px 12px;border-radius:10px;background:transparent;border:1px solid transparent;color:var(--texto);font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:10px}
  .side-config-btn:hover{background:var(--b06)}
  .side-config-btn.active{background:var(--panel-2);border-color:var(--b12)}

  .editor{padding:26px 30px;overflow-y:auto;max-width:780px}
  .editor h2{font-size:17px;font-weight:700;margin-bottom:4px;letter-spacing:-.01em}
  .editor .sub{font-size:12.5px;color:var(--texto-2);margin-bottom:24px;line-height:1.5}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:11.5px;font-weight:600;color:var(--texto-2);margin-bottom:7px;letter-spacing:.02em}
  .field input[type=text],.field input[type=url],.field input[type=number],.field select,.field textarea{width:100%;padding:12px 14px;border-radius:10px;font-size:13.5px;color:var(--texto);background:var(--panel-2);border:1px solid var(--b08);transition:border-color .15s ease}
  .field textarea{resize:vertical;min-height:64px;line-height:1.5}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--verde)}
  .field .hint{font-size:11px;color:var(--texto-2);margin-top:6px;line-height:1.5}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .grid-3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px}
  @media(max-width:640px){.grid-2,.grid-3{grid-template-columns:1fr}}
  .check-row{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500;cursor:pointer;user-select:none}
  .check-row input{width:17px;height:17px;accent-color:var(--verde)}

  .opt-card{background:var(--panel-2);border:1px solid var(--b08);border-radius:12px;padding:14px;margin-bottom:10px}
  .opt-row{display:flex;gap:10px;align-items:center;margin-bottom:10px}
  .opt-row:last-child{margin-bottom:0}
  .opt-row input,.opt-row select{padding:10px 12px;border-radius:8px;font-size:13px;color:var(--texto);background:var(--panel);border:1px solid var(--b08)}
  .opt-row input:focus,.opt-row select:focus{outline:none;border-color:var(--verde)}
  .opt-row .grow{flex:1;min-width:0}
  .opt-row .pontos{width:88px;flex-shrink:0;text-align:center}
  .opt-row .mini-label{font-size:10.5px;color:var(--texto-2);font-weight:600;flex-shrink:0}
  .icon-btn{width:34px;height:34px;border-radius:8px;flex-shrink:0;background:var(--b06);border:1px solid var(--b08);color:var(--texto-2);display:flex;align-items:center;justify-content:center;transition:all .15s ease}
  .icon-btn:hover{color:#ff7676;border-color:rgba(255,118,118,.4)}
  .logic-row{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--texto-2)}
  .logic-row svg{flex-shrink:0;color:#ffbe3c}
  .logic-row select{flex:1;padding:8px 10px;border-radius:8px;font-size:12px;color:var(--texto);background:var(--panel);border:1px solid var(--b08)}
  .logic-row select.custom{border-color:rgba(255,190,60,.5)}
  .btn-add-opt{width:100%;padding:11px;border-radius:10px;font-size:12px;font-weight:600;background:transparent;border:1px dashed var(--b20);color:var(--texto-2);margin-top:4px}
  .btn-add-opt:hover{color:var(--verde);border-color:var(--verde)}
  .editor-actions{display:flex;gap:8px;margin-top:22px;flex-wrap:wrap}
  .ebtn{padding:10px 14px;border-radius:9px;font-size:12px;font-weight:600;background:var(--b06);border:1px solid var(--b08);color:var(--texto);display:flex;align-items:center;gap:7px}
  .ebtn:hover{background:var(--b12)}
  .ebtn.danger:hover{color:#ff7676;border-color:rgba(255,118,118,.4);background:transparent}
  .section-title{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--texto-2);margin:26px 0 14px;padding-top:20px;border-top:1px solid var(--b08)}
  .color-row{display:flex;align-items:center;gap:10px}
  .color-row input[type=color]{width:46px;height:42px;padding:3px;border-radius:10px;cursor:pointer;background:var(--panel-2);border:1px solid var(--b08)}
  .color-row input[type=text]{flex:1}
  .img-slot{display:flex;align-items:center;gap:14px;background:var(--panel-2);border:1px solid var(--b08);border-radius:12px;padding:14px}
  .img-slot .thumb{width:74px;height:74px;border-radius:10px;flex-shrink:0;overflow:hidden;background:radial-gradient(ellipse at center,var(--azul-900),var(--azul-950));border:1px solid var(--b08);display:flex;align-items:center;justify-content:center}
  .img-slot .thumb img{width:100%;height:100%;object-fit:cover}
  .img-slot .thumb.contain img{object-fit:contain;padding:8px}
  .img-slot .meta{flex:1;min-width:0}
  .img-slot .meta .n{font-size:12.5px;font-weight:600;margin-bottom:3px}
  .img-slot .meta .d{font-size:11px;color:var(--texto-2);line-height:1.5}
  .img-slot .acts{display:flex;flex-direction:column;gap:6px}

  .preview-col{border-left:1px solid var(--b08);background:var(--panel);display:flex;flex-direction:column;align-items:center;padding:20px 16px;gap:14px;position:sticky;top:63px;height:calc(100vh - 63px);overflow-y:auto}
  .preview-head{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:360px}
  .preview-head span{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--texto-2)}
  #preview-frame{width:352px;height:680px;flex-shrink:0;border-radius:24px;border:1px solid var(--b12);background:#000;overflow:hidden}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--panel-2);border:1px solid var(--verde);color:var(--texto);padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:0 8px 30px rgba(0,0,0,.4)}
  .toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="mark"><svg width="18" height="21" viewBox="0 0 36 42" fill="#003057"><circle cx="18" cy="8" r="5"/><circle cx="7" cy="18" r="5"/><circle cx="29" cy="18" r="5"/><circle cx="12" cy="31" r="5"/><circle cx="24" cy="31" r="5"/></svg></div>
    <div><h1>Editor do Diagnóstico FACE</h1><span>Blocos · Pontuação · Prescrição · Exportação</span></div>
  </div>
  <div class="header-actions">
    <button class="hbtn" onclick="importJSON()">Importar</button>
    <button class="hbtn" onclick="exportJSON()">Salvar .json</button>
    <button class="hbtn primary" onclick="exportHTML()">Baixar página pronta →</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <p class="side-label">Blocos de diagnóstico</p>
    <div id="bloco-list"></div>
    <button class="btn-add-bloco" onclick="addBloco()">+ Bloco</button>

    <p class="side-label">Passos do fluxo</p>
    <div id="step-list"></div>
    <div class="add-grid">
      <button onclick="addStep('input')">+ Campo</button>
      <button onclick="addStep('options')">+ Escolha única</button>
      <button onclick="addStep('multi')">+ Múltipla escolha</button>
      <button onclick="addStep('mensagem')">+ Mensagem</button>
    </div>

    <div class="side-sep"></div>
    <button class="side-config-btn" id="btn-config" onclick="selectPanel('config')">⚙︎&nbsp; Configurações e resultado</button>
    <button class="side-config-btn" id="btn-tema" onclick="selectPanel('tema')">🎨&nbsp; Identidade visual</button>
  </aside>

  <main class="editor" id="editor"></main>

  <aside class="preview-col">
    <div class="preview-head">
      <span>Preview ao vivo</span>
      <button class="hbtn" onclick="refreshPreview()" style="padding:7px 11px">↺ Reiniciar</button>
    </div>
    <iframe id="preview-frame" title="Preview do Raio-X"></iframe>
  </aside>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="file-input" accept=".json" style="display:none"/>
<input type="file" id="img-input" accept="image/*" style="display:none"/>

function migrate(c){
  if(!c.tema) c.tema = defaultTema();
  if(!c.resultado) c.resultado = defaultResultado();
  if(!c.resultado.tituloPlano) c.resultado.tituloPlano = "Plano de Ação do Diagnóstico";
  if(!c.gap) c.gap = defaultGap();
  if(!c.blocos) c.blocos = [];
  c.blocos.forEach(b=>{ if(!b.recomendacoes) b.recomendacoes = []; });
  (c.passos||[]).forEach(p=>{
    if(p.bloco===undefined) p.bloco = "";
    if(p.opcoes) p.opcoes = p.opcoes.map(o=> typeof o==="string" ? {texto:o,subtitulo:"",pontos:0,goTo:""} : Object.assign({texto:"",subtitulo:"",pontos:0,goTo:""},o));
  });
  return c;
}
try{
  const saved = localStorage.getItem("raiox-editor-facescale-v1");
  if(saved){ config = migrate(JSON.parse(saved)); selectedId = config.passos[0] ? config.passos[0].id : "config"; }
}catch(e){}
function persist(){ try{ localStorage.setItem("raiox-editor-facescale-v1", JSON.stringify(config)); }catch(e){} }

/* ===== HELPERS ===== */
const $ = s => document.querySelector(s);
const FONTES = ["Inter","Nunito Sans","Playfair Display","Poppins","Montserrat","Manrope","Sora","DM Sans","Space Grotesk"];
function esc(str){ return String(str??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function findStep(id){ return config.passos.find(p=>p.id===id); }
function stepIndex(id){ return config.passos.findIndex(p=>p.id===id); }
function findBloco(id){ return config.blocos.find(b=>b.id===id); }
function hasLogic(p){ return p.type==="options" && (p.opcoes||[]).some(o=>o.goTo); }
function toast(msg){
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove("show"), 2600);
}
function changed(){ persist(); renderSidebar(); schedulePreview(); }
function camposMoeda(){ return config.passos.filter(p=>p.type==="input" && p.inputType==="moeda"); }
function camposNumero(){ return config.passos.filter(p=>p.type==="input" && p.inputType==="numero"); }

/* =====================================================================
   SIDEBAR
   ===================================================================== */
function renderSidebar(){
  const bl = $("#bloco-list");
  bl.innerHTML = "";
  config.blocos.forEach(b=>{
    const btn = document.createElement("button");
    btn.className = "bloco-item" + (selectedId==="bloco:"+b.id ? " active" : "");
    btn.onclick = ()=>{ selectedId = "bloco:"+b.id; renderSidebar(); renderEditor(); };
    btn.innerHTML = '<span class="dot" style="background:'+esc(b.cor)+'"></span><span style="flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(b.nome)+'</span>';
    bl.appendChild(btn);
  });

  const list = $("#step-list");
  list.innerHTML = "";
  const tipoTag = {input:"CAMPO",options:"ESCOLHA",multi:"MULTI",mensagem:"MSG"};
  config.passos.forEach((p,i)=>{
    const b = document.createElement("button");
    b.className = "step-item" + (selectedId===p.id ? " active" : "");
    const bloco = p.bloco ? findBloco(p.bloco) : null;
    b.style.borderLeftColor = bloco ? bloco.cor : "transparent";
    b.onclick = ()=>{ selectedId = p.id; renderSidebar(); renderEditor(); };
    b.innerHTML =
      '<span class="num">'+(i+1)+'</span>'+
      '<span class="info"><span class="t">'+esc(p.pergunta||p.titulo||"(sem texto)")+'</span>'+
      '<span class="k"><span class="tag '+p.type+'">'+tipoTag[p.type]+'</span>'+
      (hasLogic(p)?'<span class="tag logic">LÓGICA</span>':"")+
      (bloco?'<span style="color:'+esc(bloco.cor)+'">'+esc(bloco.nome)+'</span>':"")+'</span></span>';
    list.appendChild(b);
  });
  $("#btn-config").classList.toggle("active", selectedId==="config");
  $("#btn-tema").classList.toggle("active", selectedId==="tema");
}

function addBloco(){
  const id = "b" + (++idCounter);
  config.blocos.push({id, nome:"Novo bloco", subtitulo:"", cor:"#78BE20", recomendacoes:[]});
  selectedId = "bloco:"+id;
  changed(); renderEditor();
}
function deleteBloco(id){
  if(!confirm("Excluir este bloco? Os passos vinculados a ele ficarão sem bloco (e sem pontuação).")) return;
  config.blocos = config.blocos.filter(b=>b.id!==id);
  config.passos.forEach(p=>{ if(p.bloco===id) p.bloco=""; });
  selectedId = "config";
  changed(); renderEditor();
}

function addStep(type){
  const id = "p" + (++idCounter);
  let novo;
  if(type==="input") novo = {id,type,field:"campo_"+idCounter,pergunta:"Nova pergunta de texto",placeholder:"Digite aqui",inputType:"text",bloco:""};
  else if(type==="options") novo = {id,type,field:"pergunta_"+idCounter,pergunta:"Nova pergunta de escolha única",bloco:"",opcoes:[{texto:"Opção 1",subtitulo:"",pontos:100,goTo:""},{texto:"Opção 2",subtitulo:"",pontos:0,goTo:""}]};
  else if(type==="multi") novo = {id,type,field:"multi_"+idCounter,pergunta:"Nova pergunta de múltipla escolha",subtitulo:"Marque todos que se aplicam",bloco:"",textoBotao:"Avançar",opcoes:[{texto:"Opção 1",pontos:25},{texto:"Opção 2",pontos:25}]};
  else novo = {id,type:"mensagem",titulo:"Perfeito {nome}!",texto:"Vamos para a próxima etapa.",textoBotao:"Avançar"};
  config.passos.push(novo);
  selectedId = id;
  changed(); renderEditor();
}
function moveStep(id, dir){
  const i = stepIndex(id), j = i + dir;
  if(j<0 || j>=config.passos.length) return;
  [config.passos[i], config.passos[j]] = [config.passos[j], config.passos[i]];
  changed(); renderEditor();
}
function duplicateStep(id){
  const p = findStep(id);
  const copia = JSON.parse(JSON.stringify(p));
  copia.id = "p" + (++idCounter);
  if(copia.field) copia.field += "_copia";
  config.passos.splice(stepIndex(id)+1, 0, copia);
  selectedId = copia.id;
  changed(); renderEditor();
}
function deleteStep(id){
  if(config.passos.length<=1){ toast("O fluxo precisa de pelo menos 1 passo."); return; }
  if(!confirm("Excluir este passo?")) return;
  config.passos = config.passos.filter(p=>p.id!==id);
  config.passos.forEach(p=>{ if(p.opcoes) p.opcoes.forEach(o=>{ if(o.goTo===id) o.goTo=""; }); });
  selectedId = config.passos[0].id;
  changed(); renderEditor();
}

function blocoSelect(p){
  return '<select onchange="updStep(\''+p.id+'\',\'bloco\',this.value)">'+
    '<option value=""'+(!p.bloco?" selected":"")+'>— Sem bloco (não pontua) —</option>'+
    config.blocos.map(b=>'<option value="'+b.id+'"'+(p.bloco===b.id?" selected":"")+'>'+esc(b.nome)+'</option>').join("")+
    '</select>';
}

function renderEditor(){
  const ed = $("#editor");
  if(selectedId==="config"){ renderConfigEditor(ed); return; }
  if(selectedId==="tema"){ renderTemaEditor(ed); return; }
  if(selectedId.startsWith("bloco:")){ renderBlocoEditor(ed, selectedId.slice(6)); return; }
  const p = findStep(selectedId);
  if(!p){ selectedId="config"; renderConfigEditor(ed); return; }
  const i = stepIndex(p.id);
  const tipoNome = {input:"Campo de texto",options:"Escolha única",multi:"Múltipla escolha",mensagem:"Tela de mensagem"};

  let html = '<h2>Passo '+(i+1)+' · '+tipoNome[p.type]+'</h2>'+
    '<p class="sub">Use <b>{nome}</b> em qualquer texto para inserir o primeiro nome da pessoa.</p>';

  if(p.type==="mensagem"){
    html +=
      '<div class="field"><label>Título</label><textarea oninput="updStep(\''+p.id+'\',\'titulo\',this.value)">'+esc(p.titulo)+'</textarea></div>'+
      '<div class="field"><label>Texto de apoio</label><textarea oninput="updStep(\''+p.id+'\',\'texto\',this.value)">'+esc(p.texto||"")+'</textarea></div>'+
      '<div class="field"><label>Texto do botão</label><input type="text" value="'+esc(p.textoBotao||"Avançar")+'" oninput="updStep(\''+p.id+'\',\'textoBotao\',this.value)"/></div>';
  } else {
    html += '<div class="field"><label>Pergunta</label><textarea oninput="updStep(\''+p.id+'\',\'pergunta\',this.value)">'+esc(p.pergunta)+'</textarea></div>'+
      '<div class="grid-2">'+
      '<div class="field"><label>Chave do dado (lead)</label><input type="text" value="'+esc(p.field)+'" oninput="updStep(\''+p.id+'\',\'field\',this.value)"/>'+
      '<p class="hint">Nome do campo no webhook/dataLayer.</p></div>'+
      '<div class="field"><label>Bloco de diagnóstico</label>'+blocoSelect(p)+
      '<p class="hint">'+(p.type==="input"?"Campos de texto não pontuam mesmo dentro de bloco.":"A pontuação das opções entra na média do bloco.")+'</p></div>'+
      '</div>';
  }

  if(p.type==="input"){
    html +=
      '<div class="grid-2">'+
      '<div class="field"><label>Tipo do campo</label>'+
      '<select onchange="updStep(\''+p.id+'\',\'inputType\',this.value)">'+
      [["text","Texto"],["email","E-mail (valida @)"],["tel","Telefone/WhatsApp"],["numero","Número"],["moeda","Valor em R$"],["cidade","Cidade (autocomplete IBGE)"]]
        .map(t=>'<option value="'+t[0]+'"'+(p.inputType===t[0]?" selected":"")+'>'+t[1]+'</option>').join("")+
      '</select>'+
      (p.inputType==="moeda"?'<p class="hint">Valores em R$ podem alimentar o Gap Financeiro de Perda (Configurações).</p>':"")+
      (p.inputType==="cidade"?'<p class="hint">Sugere municípios brasileiros (IBGE) enquanto a pessoa digita. Requer internet na página publicada.</p>':"")+
      '</div>'+

/* ===== updates ===== */
function updStep(id,key,val){ findStep(id)[key]=val; changed(); if(key==="inputType"||key==="bloco") renderEditor(); }
function updCfg(key,val){ config[key]=val; persist(); schedulePreview(); }
function updRes(key,val){ config.resultado[key]=val; persist(); schedulePreview(); }
function updFaixa(i,val){ config.resultado.faixas[i].desc=val; persist(); schedulePreview(); }
function updGap(key,val){ config.gap[key]=val; persist(); schedulePreview(); if(key==="ativo") renderEditor(); }
function updOpt(id,oi,key,val){ findStep(id).opcoes[oi][key]=val; changed(); if(key==="goTo") renderEditor(); }
function addOpt(id){
  const p = findStep(id);
  p.opcoes.push(p.type==="multi" ? {texto:"Nova opção",pontos:0} : {texto:"Nova opção",subtitulo:"",pontos:0,goTo:""});
  changed(); renderEditor();
}
function delOpt(id,oi){
  const p = findStep(id);
  if(p.opcoes.length<=2){ toast("Precisa de pelo menos 2 opções."); return; }
  p.opcoes.splice(oi,1); changed(); renderEditor();
}
function updBloco(id,key,val){ findBloco(id)[key]=val; changed(); }
function addRec(bid){ findBloco(bid).recomendacoes.push({nome:"Novo produto",link:"",limite:75}); changed(); renderEditor(); }
function updRec(bid,ri,key,val){ findBloco(bid).recomendacoes[ri][key]=val; changed(); }
function delRec(bid,ri){ findBloco(bid).recomendacoes.splice(ri,1); changed(); renderEditor(); }
function updTema(key,val){ config.tema[key]=val; persist(); schedulePreview(); }
function resetTema(){
  if(!confirm("Restaurar a identidade visual padrão?")) return;
  config.tema = defaultTema(); persist(); renderEditor(); schedulePreview();
}
function uploadImg(key){
  const fi = $("#img-input");
  fi.onchange = ()=>{
    const f = fi.files[0]; if(!f) return;
    if(f.size > 1.5*1024*1024) toast("Imagem grande ("+(f.size/1024/1024).toFixed(1)+" MB) — a página pode ficar pesada.");
    const r = new FileReader();
    r.onload = ()=>{ config.tema[key]=r.result; persist(); renderEditor(); schedulePreview(); };
    r.readAsDataURL(f); fi.value="";
  };
  fi.click();
}
function clearImg(key){ config.tema[key]=""; persist(); renderEditor(); schedulePreview(); }

/* =====================================================================
   IMPORTAR / EXPORTAR
   ===================================================================== */
function download(nome,conteudo,tipo){
  const blob = new Blob([conteudo],{type:tipo});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = nome; a.click();
  URL.revokeObjectURL(a.href);
}
function exportJSON(){ download("raiox-config.json", JSON.stringify(config,null,2), "application/json"); toast("Configuração salva."); }
function importJSON(){
  const fi = $("#file-input");
  fi.onchange = ()=>{
    const f = fi.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = ()=>{
      try{
        const c = JSON.parse(r.result);
        if(!c.passos || !Array.isArray(c.passos)) throw new Error();
        config = migrate(c);
        selectedId = config.passos[0] ? config.passos[0].id : "config";
        idCounter = 100 + config.passos.length*7 + config.blocos.length*3;
        changed(); renderEditor(); refreshPreview();
        toast("Configuração importada!");
      }catch(e){ toast("Arquivo inválido — use um .json deste editor."); }
    };
    r.readAsText(f); fi.value="";
  };
  fi.click();
}
function exportHTML(){
  download("raio-x.html", buildQuizHTML(config), "text/html");
  toast("Página pronta baixada: raio-x.html");
}

function refreshPreview(){ $("#preview-frame").srcdoc = buildQuizHTML(config); }

/* ============== ENGINE (roda dentro da página exportada) ============== */
function QUIZ_ENGINE(CONFIG){
  "use strict";
  var $id = function(id){ return document.getElementById(id); };
  var respostas = {};
  var history = [];
  var currentId = null;

  /* ---------- helpers ---------- */
  function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function shade(h,p){ try{ var n=parseInt(h.slice(1),16),r=(n>>16)&255,g=(n>>8)&255,b=n&255;
    r=Math.min(255,Math.max(0,Math.round(r*(100+p)/100)));g=Math.min(255,Math.max(0,Math.round(g*(100+p)/100)));b=Math.min(255,Math.max(0,Math.round(b*(100+p)/100)));
    return "#"+((r<<16)|(g<<8)|b).toString(16).padStart(6,"0"); }catch(e){ return h; } }
  function rgbOf(h){ try{ var n=parseInt(h.slice(1),16); return (((n>>16)&255)+","+((n>>8)&255)+","+(n&255)); }catch(e){ return "0,48,87"; } }
  function primeiroNome(){ return respostas.nome ? String(respostas.nome).trim().split(" ")[0] : ""; }
  function subst(t){ return String(t==null?"":t).split("{nome}").join(primeiroNome()||"você"); }
  function fmtBRL(n){ var v=Math.round(Number(n)||0); return "R$ " + String(v).replace(/\B(?=(\d{3})+(?!\d))/g,"."); }
  function norm(s){ return String(s).normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase(); }
  function findStep(id){ return CONFIG.passos.find(function(p){return p.id===id;}); }
  function stepIndex(id){ return CONFIG.passos.findIndex(function(p){return p.id===id;}); }
  function findBloco(id){ return (CONFIG.blocos||[]).find(function(b){return b.id===id;}); }
  function animateText(el, text, base, stag){
    base=base||0; stag=stag||45; el.innerHTML="";
    String(text||"").split(" ").forEach(function(w,i){
      var s=document.createElement("span"); s.className="word"; s.textContent=w;
      s.style.animationDelay=(base+i*stag)+"ms";
      el.appendChild(s); el.appendChild(document.createTextNode(" "));
    });
  }
  function logoHTML(altura){
    var t = CONFIG.tema||{};
    if(t.logoData) return '<img src="'+t.logoData+'" alt="" style="height:'+altura+'px;display:block;max-width:160px;object-fit:contain"/>';
    return '<svg width="'+Math.round(altura*0.86)+'" height="'+altura+'" viewBox="0 0 36 42" fill="#fff" aria-hidden="true"><circle cx="18" cy="8" r="5"/><circle cx="7" cy="18" r="5"/><circle cx="29" cy="18" r="5"/><circle cx="12" cy="31" r="5"/><circle cx="24" cy="31" r="5"/></svg>';
  }
  function showScreen(id){
    ["screen-start","screen-flow","screen-loading","screen-result"].forEach(function(s){
      $id(s).classList.toggle("active", s===id);
    });
  }

  /* ---------- tema ---------- */
  (function(){
    var t = CONFIG.tema||{};
    var r = document.documentElement.style;
    if(t.corFundo){ r.setProperty("--azul-900",t.corFundo); r.setProperty("--azul-950",shade(t.corFundo,-35)); r.setProperty("--azul-1000",shade(t.corFundo,-60)); r.setProperty("--azul-rgb",rgbOf(t.corFundo)); }
    if(t.corPrimaria){ r.setProperty("--verde",t.corPrimaria); r.setProperty("--verde-escuro",shade(t.corPrimaria,-18)); }
    if(t.corTextoBotao){ r.setProperty("--btn-text",t.corTextoBotao); }
    if(t.fonte && t.fonte!=="Inter"){
      var l=document.createElement("link"); l.rel="stylesheet";
      l.href="https://fonts.googleapis.com/css2?family="+t.fonte.split(" ").join("+")+":wght@400;500;600;700;800&display=swap";
      document.head.appendChild(l);
      document.body.style.fontFamily="'"+t.fonte+"',system-ui,sans-serif";
    }
    if(t.fotoData){
      var bp=$id("bg-photo");
      bp.style.backgroundImage="url("+t.fotoData+")";
      bp.style.backgroundSize="cover"; bp.style.backgroundPosition="top center";
      var sil=bp.querySelector(".silhueta"); if(sil) sil.style.display="none";
    }
  })();

  /* ---------- cidades (IBGE) ---------- */
  var cidades = null, cidadesPedido = false;
  function carregarCidades(cb){
    if(cidades){ cb(); return; }
    if(cidadesPedido) return;
    cidadesPedido = true;
    fetch("https://servicodados.ibge.gov.br/api/v1/localidades/municipios?orderBy=nome")
      .then(function(r){ return r.json(); })
      .then(function(j){
        cidades = j.map(function(m){
          var uf = "";
          try{ uf = m.microrregiao.mesorregiao.UF.sigla; }catch(e){}
          if(!uf){ try{ uf = m["regiao-imediata"]["regiao-intermediaria"].UF.sigla; }catch(e){} }
          return m.nome + (uf ? " / "+uf : "");
        });
        cb();
      })
      .catch(function(){ cidades = []; });
  }

  /* ---------- pontuação ---------- */
  function calcScores(){
    var porBloco = {};
    CONFIG.passos.forEach(function(p){
      if(!p.bloco || (p.type!=="options" && p.type!=="multi")) return;
      var r = respostas[p.field];
      if(r==null) return;
      var pts = null;
      if(p.type==="options"){
        var op = (p.opcoes||[]).find(function(o){ return o.texto===r; });
        if(op) pts = Number(op.pontos)||0;
      }else{
        var marcadas = Array.isArray(r)?r:[];
        pts = Math.min(100, (p.opcoes||[]).filter(function(o){ return marcadas.indexOf(o.texto)>-1; })
          .reduce(function(s,o){ return s+(Number(o.pontos)||0); },0));
      }
      if(pts==null) return;
      (porBloco[p.bloco]=porBloco[p.bloco]||[]).push(pts);
    });
    var blocos = (CONFIG.blocos||[]).map(function(b){
      var arr = porBloco[b.id];
      if(!arr || !arr.length) return null;
      return { bloco:b, score: Math.round(arr.reduce(function(a,c){return a+c;},0)/arr.length) };
    }).filter(Boolean);
    var geral = blocos.length ? Math.round(blocos.reduce(function(a,c){return a+c.score;},0)/blocos.length) : 0;
    return { blocos:blocos, geral:geral };
  }
  function faixaDe(score){
    var fs = CONFIG.resultado.faixas;
    for(var i=0;i<fs.length;i++){ if(score<=fs[i].ate) return fs[i]; }
    return fs[fs.length-1];
  }

  /* ---------- navegação ---------- */
  function goToStep(id){ history.push(currentId); currentId=id; renderStep(); }
  function nextSequential(){
    var i = stepIndex(currentId);
    if(i < CONFIG.passos.length-1){ goToStep(CONFIG.passos[i+1].id); }
    else finish();
  }
  function voltar(){
    if(history.length){ currentId = history.pop(); renderStep(); }
    else { document.body.classList.remove("flow"); showScreen("screen-start"); }
  }

  /* ---------- render do passo ---------- */
  function renderStep(){
    var p = findStep(currentId);
    if(!p){ finish(); return; }
    var sc = $id("screen-flow");
    var bloco = p.bloco ? findBloco(p.bloco) : null;

    var headHTML = '<div class="flow-header">'+logoHTML(32);
    if(bloco){
      var doBloco = CONFIG.passos.filter(function(x){ return x.bloco===p.bloco; });
      var pos = doBloco.findIndex(function(x){ return x.id===p.id; });
      headHTML += '<div><p class="bloco-eyebrow" style="color:'+esc(bloco.cor)+'">'+esc(bloco.nome)+'</p>'+
        (bloco.subtitulo?'<p class="bloco-sub">'+esc(bloco.subtitulo)+'</p>':'')+'</div>'+
        '<div class="bloco-dashes">'+doBloco.map(function(x,xi){
          return '<span class="'+(xi===pos?"cur":"")+'" style="background:'+(xi<=pos?esc(bloco.cor):"rgba(255,255,255,.2)")+'"></span>';
        }).join("")+'</div>';
    } else if(p.type!=="mensagem" && respostas.nome && p.field!=="nome"){
      headHTML += '<p class="greeting" id="greet"></p>';
    }
    headHTML += '</div>';

    if(p.type==="mensagem"){
      sc.innerHTML = headHTML +
        '<div class="msg-area"><h2 class="msg-title" id="msg-title"></h2>'+
        (p.texto?'<p class="msg-text">'+esc(subst(p.texto))+'</p>':'')+
        '<div class="msg-btns">'+
        '<button class="pill" id="btn-voltar"><span class="circle">←</span>Voltar</button>'+
        '<button class="pill go" id="btn-avancar">'+esc(p.textoBotao||"Avançar")+'<span class="circle">→</span></button>'+
        '</div></div><div></div>';
      animateText($id("msg-title"), subst(p.titulo||""), 100);
      $id("btn-voltar").onclick = voltar;
      $id("btn-avancar").onclick = nextSequential;
      return;
    }

    sc.innerHTML = headHTML +
      '<div class="chat-card"><p class="chat-question" id="q"></p>'+
      (p.subtitulo?'<p class="chat-sub">'+esc(p.subtitulo)+'</p>':'')+
      '<div class="chat-body" id="body"></div></div>'+
      '<div class="flow-bottom"><button class="pill" id="btn-voltar"><span class="circle">←</span>Voltar</button></div>';

    var g = $id("greet");
    if(g) animateText(g, "Prazer te conhecer, "+primeiroNome()+".");
    animateText($id("q"), subst(p.pergunta||""), 130);
    $id("btn-voltar").onclick = voltar;

    var body = $id("body");

    if(p.type==="input") renderInput(p, body);
    if(p.type==="options") renderOptions(p, body);
    if(p.type==="multi") renderMulti(p, body);
  }

  function renderInput(p, body){
    var row = document.createElement("div"); row.className="input-row";
    var input = document.createElement("input");
    var it = p.inputType||"text";
    input.type = it==="email" ? "email" : it==="tel" ? "tel" : "text";
    if(it==="numero"||it==="moeda") input.inputMode="numeric";
    input.placeholder = p.placeholder||"";
    input.value = respostas[p.field]||"";
    input.autocomplete = p.field==="nome"?"name":p.field==="email"?"email":p.field==="whatsapp"?"tel":"off";
    var btn = document.createElement("button");
    btn.className="btn-next"; btn.setAttribute("aria-label","Avançar");
    btn.innerHTML = "→";
    row.appendChild(input); row.appendChild(btn);
    body.appendChild(row);

    var sugBox = null;
    if(it==="cidade"){
      sugBox = document.createElement("div"); sugBox.className="sugestoes";
      body.appendChild(sugBox);
      carregarCidades(function(){});
    }
    if(it==="moeda" && !input.value) input.value = "";

    function valorNum(){
      if(it==="moeda") return Number(String(input.value).replace(/[^\d]/g,""));
      if(it==="numero") return Number(String(input.value).replace(/[^\d.,]/g,"").replace(",", "."));
      return null;
    }
    function valida(v){
      if(it==="email") return v.indexOf("@")>-1 && v.indexOf(".")>-1;
      if(it==="tel") return v.replace(/\D/g,"").length>=10;
      if(it==="moeda") return String(input.value).replace(/[^\d]/g,"").length>0;
      if(it==="numero") return String(v).trim()!=="" && !isNaN(valorNum()) && valorNum()>=0 && (!p.max || valorNum()<=Number(p.max));
      return String(v).trim().length>=2;
    }
    function sync(){ btn.classList.toggle("ready", valida(input.value)); }
    function avancar(){
      if(!valida(input.value)) return;
      respostas[p.field] = input.value.trim();
      if(it==="moeda"||it==="numero") respostas[p.field+"__num"] = valorNum();
      nextSequential();
    }
    input.addEventListener("input", function(){
      if(it==="moeda"){
        var d = String(input.value).replace(/[^\d]/g,"").slice(0,10);
        input.value = d ? fmtBRL(Number(d)) : "";
      }
      if(it==="numero" && p.max){
        var dn = String(input.value).replace(/[^\d]/g,"").slice(0, String(p.max).length);
        input.value = dn;
      }
      sync();
      if(it==="cidade" && sugBox){
        var v = norm(input.value);
        sugBox.innerHTML = "";
        if(v.length>=2 && cidades){
          cidades.filter(function(c){ return norm(c).indexOf(v)===0; }).slice(0,6).forEach(function(c){
            var s = document.createElement("button");
            s.className="sugestao"; s.type="button"; s.textContent=c;
            s.onclick = function(){
              input.value = c; respostas[p.field]=c; sync();
              setTimeout(nextSequential, 160);
            };
            sugBox.appendChild(s);
          });
        }
      }
    });
    input.addEventListener("keydown", function(e){ if(e.key==="Enter") avancar(); });
    btn.onclick = avancar;
    sync();
    setTimeout(function(){ input.focus(); }, 450);
  }

  function renderOptions(p, body){
    var rico = (p.opcoes||[]).some(function(o){ return o.subtitulo; });
    var wrap = document.createElement("div"); wrap.className="options";
    wrap.setAttribute("role","radiogroup");
    (p.opcoes||[]).forEach(function(o,i){
      var b = document.createElement("button");
      b.className = "option"+(respostas[p.field]===o.texto?" selected":"");
      b.style.animationDelay = (300+i*80)+"ms";
      b.setAttribute("role","radio");
      b.setAttribute("aria-checked", respostas[p.field]===o.texto?"true":"false");
      if(rico){
        b.innerHTML = '<span class="otxt"><span class="otit">'+esc(o.texto)+'</span>'+
          (o.subtitulo?'<div class="osub">'+esc(o.subtitulo)+'</div>':'')+'</span><span class="dot"></span>';
      }else{
        b.innerHTML = '<span class="dot"></span><span class="otxt">'+esc(o.texto)+'</span>';
      }
      b.onclick = function(){
        respostas[p.field] = o.texto;
        Array.prototype.forEach.call(wrap.children, function(x){ x.classList.remove("selected"); x.setAttribute("aria-checked","false"); });
        b.classList.add("selected"); b.setAttribute("aria-checked","true");
        setTimeout(function(){
          if(o.goTo==="fim"){ history.push(currentId); finish(); }
          else if(o.goTo && findStep(o.goTo)){ goToStep(o.goTo); }
          else nextSequential();
        }, 300);
      };
      wrap.appendChild(b);
    });
    body.appendChild(wrap);
  }

  function renderMulti(p, body){
    if(!Array.isArray(respostas[p.field])) respostas[p.field] = respostas[p.field]||[];
    var wrap = document.createElement("div"); wrap.className="options";
    (p.opcoes||[]).forEach(function(o,i){
      var sel = respostas[p.field].indexOf(o.texto)>-1;
      var b = document.createElement("button");
      b.className = "mopt"+(sel?" selected":"");
      b.style.animationDelay = (280+i*60)+"ms";
      b.setAttribute("role","checkbox");
      b.setAttribute("aria-checked", sel?"true":"false");
      b.innerHTML = '<span class="cb">✓</span><span class="otxt">'+esc(o.texto)+'</span>';
      b.onclick = function(){
        var arr = respostas[p.field];
        var ix = arr.indexOf(o.texto);
        if(ix>-1) arr.splice(ix,1); else arr.push(o.texto);
        b.classList.toggle("selected", ix===-1);
        b.setAttribute("aria-checked", ix===-1?"true":"false");
      };
      wrap.appendChild(b);
    });
    body.appendChild(wrap);
    var btn = document.createElement("button");
    btn.className = "btn btn-bloco";
    btn.innerHTML = esc(p.textoBotao||"Avançar")+" →";
    btn.onclick = nextSequential;
    body.appendChild(btn);
  }

  /* ---------- finalização ---------- */
  function finish(){
    var scores = calcScores();
    var payload = {};
    Object.keys(respostas).forEach(function(k){ payload[k]=respostas[k]; });
    payload.pontuacao_geral = scores.geral;
    payload.pontuacao_blocos = scores.blocos.map(function(s){
      return { bloco:s.bloco.nome, score:s.score, status:faixaDe(s.score).label };
    });
    payload.data = new Date().toISOString();
    if(CONFIG.webhookUrl){
      fetch(CONFIG.webhookUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)}).catch(function(){});
    }
    window.dataLayer = window.dataLayer||[];
    window.dataLayer.push(Object.assign({event:"quiz_lead"}, payload));
    showScreen("screen-loading");
    runLoading(function(){ showResult(scores); });
  }

  function runLoading(done){
    var pct=0, si=0;
    var pctEl=$id("loading-pct"), stepEl=$id("loading-step");
    var steps = CONFIG.loadingSteps||["Processando"];
    pctEl.textContent="0%"; stepEl.textContent=steps[0];
    var t = setInterval(function(){
      pct += Math.floor(Math.random()*7)+3;
      if(pct>=100){ pct=100; clearInterval(t); setTimeout(done, 450); }
      pctEl.textContent = pct+"%";
      var s = Math.min(Math.floor(pct/(100/steps.length)), steps.length-1);
      if(s!==si){ si=s; stepEl.textContent=steps[s]; }
    },170);
  }

  /* ---------- resultado ---------- */
  /* Mapa da face — cada pilar ocupa um terço facial, colorido pela sua faixa.
     A inicial de cada bloco (F · A · C · E) amarra o mapa aos cards abaixo. */
  function faceMapSVG(blocos){
    if(!blocos.length) return "";
    var W=300, H=356, topY=34, botY=344, cx=150;
    var face = "M150,36 C110,36 68,62 66,130 C65,170 64,196 70,226 C78,268 106,318 150,344 C194,318 222,268 230,226 C236,196 235,170 234,130 C232,62 190,36 150,36 Z";
    var h = (botY-topY)/blocos.length;
    var bands="", seps="", labels="";
    blocos.forEach(function(s,i){
      var y = topY + i*h, fb = faixaDe(s.score);
      var op = (0.12 + 0.22*(s.score/100)).toFixed(2);
      bands += '<rect x="0" y="'+y.toFixed(1)+'" width="'+W+'" height="'+h.toFixed(1)+'" fill="'+fb.cor+'" opacity="'+op+'" clip-path="url(#facemask)"/>';
      if(i>0) seps += '<line x1="0" y1="'+y.toFixed(1)+'" x2="'+W+'" y2="'+y.toFixed(1)+'" stroke="rgba(255,255,255,.3)" stroke-width="1" clip-path="url(#facemask)"/>';
      labels += '<text x="'+cx+'" y="'+(y+h/2+6).toFixed(1)+'" text-anchor="middle" font-size="18" font-weight="800" fill="'+fb.cor+'">'+
        esc(String(s.bloco.nome).charAt(0).toUpperCase())+
        '<tspan font-size="13" font-weight="700" dx="7">'+s.score+'%</tspan></text>';
    });
    return '<svg class="face-map" viewBox="0 0 '+W+' '+H+'" aria-label="Mapa da operação por pilar">'+
      '<defs><clipPath id="facemask"><path d="'+face+'"/></clipPath></defs>'+
      '<path d="'+face+'" fill="rgba(255,255,255,.04)"/>'+
      bands + seps + labels +
      '<path d="'+face+'" fill="none" stroke="rgba(255,255,255,.45)" stroke-width="1.6"/>'+
      '</svg>';
  }

  function showResult(scores){
    var sc = $id("screen-result");
    var f = faixaDe(scores.geral);
    var esq = CONFIG.resultado.faixas;
    var html = '<div class="res-wrap">'+logoHTML(30)+
      '<p class="res-eyebrow">'+esc(CONFIG.resultado.eyebrow||"")+'</p>'+
      '<h2 class="res-title">'+esc(subst(CONFIG.resultado.titulo||""))+'</h2>'+
      faceMapSVG(scores.blocos)+
      '<p class="res-geral" style="color:'+f.cor+'">'+scores.geral+'%</p>'+
      '<p class="res-status" style="color:'+f.cor+'">'+esc(f.label)+'</p>'+
      '<p class="res-status-desc">'+esc(f.desc)+'</p>';

    scores.blocos.forEach(function(s){
      var fb = faixaDe(s.score);
      html += '<div class="res-bloco">'+
        '<div class="rb-head">'+
        '<div class="rb-ico" style="background:'+s.bloco.cor+'22;color:'+esc(s.bloco.cor)+'">'+esc(s.bloco.nome.charAt(0))+'</div>'+
        '<div class="rb-info"><p class="rb-nome">'+esc(s.bloco.nome)+'</p>'+
        '<p class="rb-status" style="color:'+fb.cor+'">'+esc(fb.label)+'</p></div>'+
        '<span class="rb-pct" style="color:'+fb.cor+'">'+s.score+'%</span></div>'+
        '<div class="res-bar"><i style="width:'+s.score+'%;background:linear-gradient(90deg,'+fb.cor+'aa,'+fb.cor+')"></i></div>'+
        '<div class="res-scale">'+esq.map(function(x){ return '<span>'+esc(x.label)+'</span>'; }).join("")+'</div>'+
        '</div>';
    });

    /* prescrição */
    var presc = scores.blocos.map(function(s){
      var recs = (s.bloco.recomendacoes||[]).filter(function(r){ return s.score <= (r.limite==null?75:Number(r.limite)); });
      return recs.length ? {s:s, recs:recs} : null;
    }).filter(Boolean);
    if(presc.length){
      html += '<div class="res-sec">◈&nbsp; '+esc(CONFIG.resultado.tituloPlano||"Plano de Ação do Diagnóstico")+'</div>';
      presc.forEach(function(pr){
        var fb = faixaDe(pr.s.score);
        html += '<div class="presc-card"><div class="presc-head"><span>'+esc(pr.s.bloco.nome)+'</span>'+
          '<span style="color:'+fb.cor+'">'+pr.s.score+'%</span></div><div class="presc-chips">'+
          pr.recs.map(function(r,ri){
            var cls = ri===0 ? "ok" : "plus";
            var pref = ri===0 ? "✓ " : "+ ";
            var inner = pref+esc(r.nome);
            return r.link
              ? '<a class="chip '+cls+'" href="'+esc(r.link)+'" target="_blank" rel="noopener">'+inner+'</a>'
              : '<span class="chip '+cls+'">'+inner+'</span>';
          }).join("")+'</div></div>';
      });
    }

    /* projeção 12 meses */
    var gp = CONFIG.gap||{};
    if(gp.ativo){
      function numDe(campo){ var v = Number(respostas[(campo||"")+"__num"]); return isNaN(v)?null:v; }
      var inv = numDe(gp.campoInvestimento);
      var meses = numDe(gp.campoMeses);
      var cons = numDe(gp.campoConsultas);
      var tik = numDe(gp.campoTicket);
      var temInvest = inv!=null && meses!=null && meses>0 && inv>0;
      var temPotencial = cons!=null && cons>0 && tik!=null && tik>0;
      if(temInvest || temPotencial){
        html += '<div class="proj-card">'+
          '<p class="proj-eyebrow">◎ '+esc(gp.titulo||"GAP FINANCEIRO DE PERDA")+'</p>'+
          '<p class="proj-text">'+esc(gp.texto||"")+'</p>';
        if(temInvest){
          html += '<div class="proj-line"><span>'+esc(gp.labelInvestimento||"Investimento/mês")+'</span><b>'+fmtBRL(inv)+'</b></div>'+
            '<div class="proj-line"><span>'+esc(gp.labelMeses||"Tempo sem retorno")+'</span><b>'+meses+(meses===1?" mês":" meses")+'</b></div>'+
            '<div class="proj-total"><span class="lbl">Investido sem o retorno esperado<br>('+fmtBRL(inv)+' × '+meses+')</span>'+
            '<span class="val" style="color:#ff8a3c">'+fmtBRL(inv*meses)+'</span></div>';
        }
        if(temPotencial){
          var potencialMes = cons*tik;
          html += '<div class="proj-line" style="margin-top:'+(temInvest?'20':'12')+'px"><span>'+esc(gp.labelConsultas||"Consultas no último mês")+'</span><b>'+cons+'</b></div>'+
            '<div class="proj-line"><span>'+esc(gp.labelTicket||"Valor do procedimento principal")+'</span><b>'+fmtBRL(tik)+'</b></div>'+
            '<div class="proj-total"><span class="lbl">Potencial que passou pela clínica no mês<br>('+cons+' × '+fmtBRL(tik)+')</span>'+
            '<span class="val">'+fmtBRL(potencialMes)+'</span></div>'+
            '<div class="proj-total"><span class="lbl">Em 12 meses<br>('+fmtBRL(potencialMes)+' × 12)</span>'+
            '<span class="val">'+fmtBRL(potencialMes*12)+'</span></div>';
        }
        html += '</div>';
      }
    }

    html += '<button class="btn res-cta" id="btn-cta">'+esc(CONFIG.ctaFinal||"Falar com um especialista")+' →</button>'+
      '<div class="res-pills">'+
      '<button class="pill" id="btn-res-voltar"><span class="circle">←</span>Voltar</button>'+
      '<button class="pill" id="btn-refazer"><span class="circle">↺</span>Refazer</button>'+
      '</div></div>';

    sc.innerHTML = html;
    showScreen("screen-result");
    $id("btn-cta").onclick = function(){ location.href = CONFIG.linkFinal; };
    $id("btn-res-voltar").onclick = function(){ showScreen("screen-flow"); renderStep(); };
    $id("btn-refazer").onclick = function(){
      respostas = {}; history = [];
      currentId = CONFIG.passos[0] ? CONFIG.passos[0].id : null;
      showScreen("screen-flow"); renderStep();
    };
  }

  /* ---------- init ---------- */
  $id("logo-start").innerHTML = logoHTML(42);
  animateText($id("start-headline"), CONFIG.headline, 350, 55);
  animateText($id("start-sub"), CONFIG.subheadline, 700, 22);
  $id("btn-start").innerHTML = esc(CONFIG.ctaInicial||"Começar")+" →";
  $id("footer-note").textContent = (CONFIG.marca||"") + " © " + (new Date().getFullYear()) + " · All Rights Reserved";
  $id("btn-start").onclick = function(){
    document.body.classList.add("flow");
    currentId = CONFIG.passos[0] ? CONFIG.passos[0].id : null;
    history = [];
    showScreen("screen-flow");
    renderStep();
  };
}

    '<meta name="viewport" content="width=device-width, initial-scale=1"/>\n'+

    '<meta name="description" content="'+esc(cfg.subheadline||"")+'"/>\n'+
    '<!-- GTM: cole aqui o snippet do Google Tag Manager -->\n'+
    '<link rel="preconnect" href="https://fonts.googleapis.com">\n'+
    '<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>\n'+
    '<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">\n'+

}

renderSidebar();
renderEditor();
refreshPreview();
